<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>图片与位置</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8e8e8;
            padding: 20px;
            padding-top: env(safe-area-inset-top);
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .btn {
            padding: 18px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-photos {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            color: white;
        }
        .btn-location {
            background: linear-gradient(135deg, #00d9ff 0%, #00a8cc 100%);
            color: #1a1a2e;
        }
        .result-box {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            min-height: 100px;
            font-size: 0.9rem;
        }
        .result-box h3 {
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: #00d9ff;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        .photo-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
        }
        .status {
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        .status.success { background: rgba(0, 200, 100, 0.2); color: #4ade80; }
        .status.error { background: rgba(233, 69, 96, 0.2); color: #f87171; }
        .status.info { background: rgba(0, 217, 255, 0.2); color: #22d3ee; }
        #fileInput { display: none; }
        .btn-trajectory {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            color: white;
        }
        .map-overlay {
            position: fixed; left: 0; top: 0; right: 0; bottom: 0;
            background: #1a1a2e; z-index: 9999; display: none;
            flex-direction: column; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
        }
        .map-overlay.show { display: flex; }
        .map-overlay .map-header {
            padding: 12px 16px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(0,0,0,0.3);
        }
        .map-overlay .map-header h3 { font-size: 1rem; }
        .map-overlay #trajectoryMap {
            flex: 1; width: 100%; min-height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 图片与位置工具</h1>
        
        <div class="btn-group">
            <button class="btn btn-photos" id="btnPhotos">获取相册所有图片</button>
            <button class="btn btn-location" id="btnLocation">监听现在所在位置</button>
            <button class="btn btn-trajectory" id="btnTrajectory">查看24小时轨迹</button>
        </div>

        <input type="file" id="fileInput" accept="image/*" multiple>

        <div class="result-box" id="resultBox">
            <div id="resultContent">点击上方按钮开始使用</div>
        </div>
    </div>

    <div class="map-overlay" id="mapOverlay">
        <div class="map-header">
            <h3>过去24小时轨迹</h3>
            <button class="btn btn-location" id="btnCloseMap" style="padding:10px 16px">关闭</button>
        </div>
        <div id="trajectoryMap"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
